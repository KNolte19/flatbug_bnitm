<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>flatbug – error</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>
  <body>
    <header class="site-header">
      <span class="logo">🐛 flatbug</span>
      <span class="tagline">Automated insect detection &amp; classification</span>
    </header>

    <main class="main-content">
      <div class="card error-card">
        <div class="error-icon">⚠️</div>
        <h1>Something went wrong</h1>
        <p>{{ message }}</p>
        <a href="/" class="btn-primary" style="text-decoration: none; text-align: center; display: inline-block; width: auto; padding: 0.7rem 2rem;">
          ⬅ Back to upload
        </a>
      </div>
    </main>

    <footer class="site-footer">flatbug · BNITM insect detection</footer>
  </body>
</html>
